name: Daily U.S. News Issue

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run immediately and ignore the 8 PM New York hour check"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  create-news-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        id: generate
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || false }}
        run: |
          if [ "$FORCE_RUN" = "true" ]; then
            python scripts/daily_news_digest.py --limit-per-source 3 --force-run --title-output issue_title.txt --body-output issue_body.md
          else
            python scripts/daily_news_digest.py --limit-per-source 3 --only-at-hour 20 --title-output issue_title.txt --body-output issue_body.md
          fi
          if [ -f issue_title.txt ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue
        if: steps.generate.outputs.created == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = fs.readFileSync("issue_title.txt", "utf8").trim();
            const body = fs.readFileSync("issue_body.md", "utf8");
            const response = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
            core.info(`Created issue #${response.data.number}: ${response.data.html_url}`);
