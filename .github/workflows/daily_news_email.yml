name: Daily US News Email

on:
  schedule:
    # Run at both 00:00 and 01:00 UTC; script will only send when New York local time is 20:00.
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run immediately and ignore the 8 PM New York hour check"
        required: false
        default: true
        type: boolean

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send digest email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || false }}
        run: |
          if [ "$FORCE_RUN" = "true" ]; then
            python scripts/daily_news_digest.py --limit-per-source 3 --force-run
          else
            python scripts/daily_news_digest.py --limit-per-source 3 --only-at-hour 20
          fi
